{% extends 'MyInventoryApp/base.html' %}
{% load static %}



{% block content %}
<div class="col-md-8">

    <div class="card">
        <div class="card-header">
            <h5 class="card-title">Manage Account</h5>
        </div>
        <div class="card-body">
            
                <div class="form-group">
                    <label for="usermame">Username:</label>
                    <input type="text" class="form-control" id="dusername" name="dusername" value="{{ account.username }}" disabled>
                </div>

                <div class="row">
                    <div class="mt-4 col-4">
                        <div class="form-group">
                            <a href="/change_password/{{ account.id }}/" class="btn btn-primary">
                                Change Password
                            </a>
                        </div>
        
                    </div>
                    <div class="mt-4 col-4">
                        <div class="form-group">
                            <a href="/delete_account/{{ account.id }}/" class="btn btn-danger">
                                Delete Account
                            </a>
                        </div>
                    </div>
                    <div class="mt-4 col-4">
                        <div class="form-group">
                            <a href="/view_supplier/" class="btn btn-secondary">
                                Back
                            </a>
                        </div>
                    </div>
                </div>

        </div>
    </div>

</div>
{% endblock %}
