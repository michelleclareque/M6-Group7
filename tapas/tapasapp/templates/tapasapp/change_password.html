{% extends 'tapasapp/base.html' %}
{% load static %}



{% block content %}
<div class="col-md-8">

    <div class="card">
        <div class="card-header">
            <h5 class="card-title">Change Password</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label for="current_password">Current Password:</label>
                    <input type="password" class="form-control" name="current_password" id="current_password"required>
                </div>

                <div class="form-group">
                    <label for="new_password">New Password:</label>
                    <input type="password" class="form-control" name="new_password" id="new_password"required>
                </div>
                
                <div class="form-group">
                    <label for="new_password">Confirm New Password:</label>
                    <input type="password" class="form-control" name="confirm_password" id="confirm_password"required>
                </div>

                <button type="submit" class="mt-3 btn btn-primary">Confirm</button>
                <a href="/manage_account/{{account.id}}/" class="mt-3 btn btn-secondary">Cancel</a>
              {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
                {% endfor %}
            {% endif %}
            </form>
        </div>
    </div>

</div>
{% endblock %}
